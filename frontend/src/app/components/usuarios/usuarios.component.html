<h2 class="mb-3">Gestión de Usuarios</h2>

<button type="button" class="btn btn-primary mb-3" (click)="openModal(content)">
  Crear Usuario
</button>

<table class="table table-striped table-hover table-bordered align-middle">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Rol</th>
      <th>Usuario</th>
      <th>Clave</th>
      <th>Estado</th>
      <th>Último acceso</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let u of usuarios">
      <td>{{ u.id_usuario }}</td>
      <td>{{ u.Rol?.rol }}</td>
      <td>{{ u.usuario }}</td>
      <td>********</td>
      <td>{{ u.estado }}</td>
      <td>{{ u.ultimo_acceso | date:'short' }}</td>
      <td>
        <button class="btn btn-warning btn-sm me-2" (click)="editUsuario(u, content)">
          Editar
        </button>
        <button class="btn btn-danger btn-sm" (click)="deleteUsuario(u.id_usuario)">
          Inactivar
        </button>
      </td>
    </tr>
  </tbody>
</table>

<ng-template #content let-modal>
  <div class="modal-header">
    <h5 class="modal-title">{{ editing ? 'Editar Usuario' : 'Crear Usuario' }}</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
  </div>

  <form [formGroup]="usuarioForm" (ngSubmit)="saveUsuario()">
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">Rol:</label>
        <select formControlName="id_rol" class="form-select">
          <option *ngFor="let r of roles" [value]="r.id_rol">{{ r.rol }}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Usuario:</label>
        <input formControlName="usuario" type="text" class="form-control" />
      </div>

      <div class="mb-3">
        <label class="form-label">Clave:</label>
        <input formControlName="clave" type="password" class="form-control" />
      </div>
    </div>

    <div class="modal-footer">
      <button type="submit" class="btn btn-success">{{ editing ? 'Actualizar' : 'Crear' }}</button>
      <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancelar</button>
    </div>
  </form>
</ng-template>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div 
    class="toast align-items-center text-white border-0" 
    role="alert" 
    [class.show]="toastVisible" 
    [ngClass]="toastColor">
    <div class="d-flex">
      <div class="toast-body">
        {{ toastMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastVisible=false"></button>
    </div>
  </div>
</div>
