<h2>Gestión de Usuarios</h2>

<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#usuarioModal">
  Crear Usuario
</button>

<hr />

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Rol</th>
      <th>Usuario</th>
      <th>Clave</th>
      <th>Estado</th>
      <th>Último acceso</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let u of usuarios">
      <td>{{ u.id_usuario }}</td>
      <td>{{ u.Rol?.rol }}</td>
      <td>{{ u.usuario }}</td>
      <td>{{ '********' }}</td>
      <td>{{ u.estado }}</td>
      <td>{{ u.ultimo_acceso | date:'short' }}</td>
      <td>
        <button class="btn btn-warning btn-sm me-2" (click)="editUsuario(u)">
          Editar
        </button>
        <button class="btn btn-danger btn-sm" (click)="deleteUsuario(u.id_usuario)">
          Inactivar
        </button>
      </td>
    </tr>
  </tbody>
</table>

<!-- Modal -->
<div class="modal fade" id="usuarioModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <h3>{{ editing ? 'Editar Usuario' : 'Crear Usuario' }}</h3>
      <form [formGroup]="usuarioForm" (ngSubmit)="saveUsuario()">
        <div class="modal-body">
          <label>Rol:</label>
          <select formControlName="id_rol" class="form-select">
            <option *ngFor="let r of roles" [value]="r.id_rol">{{ r.rol }}</option>
          </select>

          <label>Usuario:</label>
          <input formControlName="usuario" type="text" class="form-control" />

          <label>Clave:</label>
          <input formControlName="clave" type="password" class="form-control" />
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">{{ editing ? 'Actualizar' : 'Crear' }}</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
