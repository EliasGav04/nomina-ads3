<div class="d-flex justify-content-between align-items-center mb-3">

  <h2 class="mb-0" style="color: #13142a;">
    Gestión de Usuarios
  </h2>

  <button 
    type="button" 
    class="btn btn-primary"
    (click)="openModal(content)"
    style="background-color: #13142a; border-color: #13142a;"
  >
    Crear Usuario
  </button>

</div>

<div class="table-container">
  <div class="table-responsive">

    <table class="table table-striped table-hover table-bordered align-middle tabla-usuarios">

      <thead class="encabezado-usuarios">
        <tr>
          <th>ID</th>
          <th>Rol</th>
          <th>Usuario</th>
          <th>Clave</th>
          <th>Estado</th>
          <th>Último acceso</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let u of usuarios">

          <td>{{ u.id_usuario }}</td>
          <td>{{ u.Rol?.rol }}</td>
          <td>{{ u.usuario }}</td>
          <td>********</td>

          <td>
            <span 
              class="estado-badge"
              [ngClass]="u.estado === 'Activo' ? 'activo' : 'inactivo'">
              {{ u.estado }}
            </span>
          </td>

          <td>{{ u.ultimo_acceso | date:'short' }}</td>

          <td class="acciones-col">
            <button class="btn btn-warning btn-sm me-2 btn-edit"
              (click)="editUsuario(u, content)">
              <i class="bi bi-pencil-square"></i>
            </button>

            <button class="btn btn-danger btn-sm btn-edit"
              (click)="deleteUsuario(u.id_usuario)">
              <i class="bi bi-trash"></i>
            </button>
          </td>

        </tr>
      </tbody>

    </table>

  </div>
</div>

<ng-template #content let-modal>
  <div class="modal-header" style="background-color: #32314e;">
    <h5 class="modal-title" style="color: white;">{{ editing ? 'Editar Usuario' : 'Crear Usuario' }}</h5>
    <button type="button" class="btn-close" data-bs-theme="dark" aria-label="Close" (click)="modal.dismiss()" ></button>
  </div>

  <form [formGroup]="usuarioForm" (ngSubmit)="saveUsuario()">
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">Rol:</label>
        <select formControlName="id_rol" class="form-select">
          <option *ngFor="let r of roles" [value]="r.id_rol">{{ r.rol }}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Usuario:</label>
        <input formControlName="usuario" type="text" class="form-control" />
      </div>

      <div class="mb-3">
        <label class="form-label">Clave:</label>
        <input formControlName="clave" type="password" class="form-control" />
      </div>
    </div>

    <div class="modal-footer">
      <button type="submit" class="btn btn-success">{{ editing ? 'Actualizar' : 'Crear' }}</button>
      <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancelar</button>
    </div>
  </form>
</ng-template>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div 
    class="toast align-items-center text-white border-0" 
    role="alert" 
    [class.show]="toastVisible" 
    [ngClass]="toastColor">
    <div class="d-flex">
      <div class="toast-body">
        {{ toastMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastVisible=false"></button>
    </div>
  </div>
</div>
