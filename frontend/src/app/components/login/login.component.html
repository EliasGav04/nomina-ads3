<div class="login-container">
  <form class="login-card" (ngSubmit)="onLogin()">
    <div class="login-icon">
      <i class="bi bi-box-arrow-in-right"></i>
    </div>

    <h2>Sistema de Nómina</h2>
    <p class="login-subtitle">Ingrese sus credenciales</p>

    <div class="mb-3">
      <label for="username" class="form-label">Usuario</label>
      <input
        type="text"
        id="username"
        class="form-control"
        placeholder="Ingrese usuario"
        [(ngModel)]="username"
        name="username"
        required
      />
    </div>

    <div class="mb-4">
      <label for="password" class="form-label">Contraseña</label>
      <input
        type="password"
        id="password"
        class="form-control"
        placeholder="Ingrese contraseña"
        [(ngModel)]="password"
        name="password"
        required
      />
    </div>

    <button type="submit" class="btn btn-dark w-100 login-btn">
      Iniciar Sesión
    </button>

    <div *ngIf="loginError" class="login-error" role="alert">
      {{ loginError }}
    </div>
  </form>
</div>
