<div class="login-container">
  <form (ngSubmit)="onLogin()">

    <h2>Iniciar sesión</h2>

    <div>
      <label for="username">Usuario</label>
      <input
        type="text"
        id="username"
        [(ngModel)]="username"
        name="username"
        required
      />
    </div>

    <div>
      <label for="password">Contraseña</label>
      <input
        type="password"
        id="password"
        [(ngModel)]="password"
        name="password"
        required
      />
    </div>

    <button type="submit">
      Entrar
    </button>

  </form>
</div>
