<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-3">Gestión de Áreas</h2> 

  <button type="button" class="btn btn-primary mb-3" (click)="openModal(content)" 
    style="background-color: #13142a; border-color: #13142a;">
    Crear Área
  </button>
</div>
<div class="card mb-3">
  <div class="card-body">
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-8">
        <label class="form-label">Buscar</label>
        <input type="text" class="form-control" [(ngModel)]="filtroTexto" placeholder="ID, área o estado" />
      </div>
      <div class="col-12 col-md-2">
        <label class="form-label">Estado</label>
        <select class="form-select" [(ngModel)]="filtroEstado">
          <option [ngValue]="'Todos'">Todos</option>
          <option [ngValue]="'Activo'">Activo</option>
          <option [ngValue]="'Inactivo'">Inactivo</option>
        </select>
      </div>
      <div class="col-12 col-md-2">
        <button type="button" class="btn btn-outline-secondary w-100" (click)="clearFiltros()">Limpiar</button>
      </div>
    </div>
  </div>
</div>
<div class="table-container">
  <div class="table-responsive">

    <table class="table table-striped table-hover table-bordered align-middle tabla-areas">

      <thead class="encabezado-areas">
        <tr>
          <th>ID</th>
          <th>Área</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let a of areasFiltradas">
          <td>{{ a.id_area }}</td>
          <td>{{ a.area }}</td>

          <td>
            <span 
              class="estado-badge"
              [ngClass]="a.estado === 'Activo' ? 'activo' : 'inactivo'">
              {{ a.estado }}
            </span>
          </td>

          <td class="acciones-col">
            <button class="btn btn-sm me-2 btn-action btn-action-edit"
              (click)="editArea(a, content)">
              <i class="bi bi-pencil-square"></i>
            </button>

            <button class="btn btn-sm btn-action btn-action-delete"
              (click)="deleteArea(a.id_area)">
              <i class="bi bi-trash"></i>
            </button>
          </td>

        </tr>
        <tr *ngIf="areasFiltradas.length === 0">
          <td colspan="4" class="text-center text-muted">No hay resultados para los filtros aplicados.</td>
        </tr>
      </tbody>

    </table>

  </div>
</div>

<ng-template #content let-modal>
  <div class="modal-header" style="background-color: #32314e;"> 
    <h5 class="modal-title" style="color: white;">{{ editing ? 'Editar Área' : 'Crear Área' }}</h5>
    <button type="button" class="btn-close" aria-label="Close" data-bs-theme="dark" (click)="modal.dismiss()"></button>
  </div>

  <form [formGroup]="areaForm" (ngSubmit)="saveArea()">
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">Nombre del Área:</label>
        <input formControlName="area" type="text" class="form-control" maxlength="50"
          (input)="onAreaInput($event)"
          [ngClass]="{'is-invalid': isInvalid('area')}" />
        <div class="form-text">Solo letras. Mínimo 3 y máximo 50 caracteres.</div>
        <div class="invalid-feedback" *ngIf="isInvalid('area')">
          Nombre inválido. Solo letras, sin números ni símbolos.
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button type="submit" class="btn btn-success" [disabled]="areaForm.invalid">
        {{ editing ? 'Actualizar' : 'Crear' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancelar</button>
    </div>
  </form>
</ng-template>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div 
    class="toast align-items-center text-white border-0" 
    role="alert" 
    [class.show]="toastVisible" 
    [ngClass]="toastColor">
    <div class="d-flex">
      <div class="toast-body">
        {{ toastMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastVisible=false"></button>
    </div>
  </div>
</div>
