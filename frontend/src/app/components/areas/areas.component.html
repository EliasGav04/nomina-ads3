<h2 class="mb-3">Gestión de Áreas</h2>

<button type="button" class="btn btn-primary mb-3" (click)="openModal(content)">
  Crear Área
</button>

<table class="table table-striped table-hover table-bordered align-middle">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Área</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let a of areas">
      <td>{{ a.id_area }}</td>
      <td>{{ a.area }}</td>
      <td>{{ a.estado }}</td>
      <td>
        <button class="btn btn-warning btn-sm me-2" (click)="editArea(a, content)">
          Editar
        </button>
        <button class="btn btn-danger btn-sm" (click)="deleteArea(a.id_area)">
          Inactivar
        </button>
      </td>
    </tr>
  </tbody>
</table>

<ng-template #content let-modal>
  <div class="modal-header">
    <h5 class="modal-title">{{ editing ? 'Editar Área' : 'Crear Área' }}</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
  </div>

  <form [formGroup]="areaForm" (ngSubmit)="saveArea()">
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">Nombre del Área:</label>
        <input formControlName="area" type="text" class="form-control" />
      </div>
    </div>

    <div class="modal-footer">
      <button type="submit" class="btn btn-success">{{ editing ? 'Actualizar' : 'Crear' }}</button>
      <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancelar</button>
    </div>
  </form>
</ng-template>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div 
    class="toast align-items-center text-white border-0" 
    role="alert" 
    [class.show]="toastVisible" 
    [ngClass]="toastColor">
    <div class="d-flex">
      <div class="toast-body">
        {{ toastMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastVisible=false"></button>
    </div>
  </div>
</div>
