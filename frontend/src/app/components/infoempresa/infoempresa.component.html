<div class="container-fluid my-5">

  <div class="card shadow-sm mx-auto" style="max-width: 1200px; width: 95%;">
    <div class="card-body">

      <div class="text-center mb-4">
        <img 
          [src]="logoBase64 || 'assets/no-photo.png'" 
          alt="Logo Empresa" 
          class="img-fluid rounded-circle" 
          style="max-width: 120px; height: auto;">
      </div>

      <h2 class="text-center mb-4">Información de la Empresa</h2>

      <form [formGroup]="empresaForm" (ngSubmit)="saveEmpresa()">

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Nombre:</label>
            <input formControlName="nombre" type="text" class="form-control" placeholder="Ingrese el nombre" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Razón Social:</label>
            <input formControlName="razon_social" type="text" class="form-control" placeholder="Ingrese la razón social" />
          </div>

          <div class="col-md-6">
            <label class="form-label">RTN:</label>
            <input formControlName="rtn" type="text" class="form-control" placeholder="Ingrese el RTN" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Teléfono:</label>
            <input formControlName="telefono" type="text" class="form-control" placeholder="Ingrese el teléfono" />
          </div>

          <div class="col-md-12">
            <label class="form-label">Dirección:</label>
            <input formControlName="direccion" type="text" class="form-control" placeholder="Ingrese la dirección" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Correo:</label>
            <input formControlName="correo" type="email" class="form-control" placeholder="Ingrese el correo" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Sitio Web:</label>
            <input formControlName="sitio_web" type="text" class="form-control" placeholder="Ingrese el sitio web" />
          </div>

          <div class="col-md-12">
            <label class="form-label">Logo:</label>
            <input type="file" class="form-control" (change)="onFileSelected($event)" />
          </div>

        </div>

        <div class="text-center my-3">
          <img 
            [src]="logoBase64 || 'assets/no-photo.png'" 
            alt="Logo Preview" 
            class="img-thumbnail" 
            style="max-width: 150px; height:auto;">
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-success btn-lg">Guardar</button>
        </div>

      </form>

    </div>
  </div>
</div>
