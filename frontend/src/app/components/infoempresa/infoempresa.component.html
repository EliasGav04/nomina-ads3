<div class="card infoempresa-card mb-4">
  <div class="card-body">
    <h4 class="mb-4">Información de la Empresa</h4>

    <form [formGroup]="empresaForm" (ngSubmit)="saveEmpresa()">
      <div class="row g-4">
        <div class="col-12 col-lg-4">
          <label class="form-label">Logo de la Empresa</label>

          <div class="logo-preview-box mb-3">
            <img
              [src]="logoBase64 || 'assets/no-photo.png'"
              alt="Logo Empresa"
              class="logo-preview-img"
            />
          </div>

          <input
            #logoInput
            type="file"
            class="d-none"
            accept="image/*"
            (change)="onFileSelected($event)"
          />
          <button type="button" class="btn btn-dark w-100 logo-btn" (click)="openLogoSelector(logoInput)">
            Cambiar Logo
          </button>
        </div>

        <div class="col-12 col-lg-8">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Nombre de la Empresa</label>
              <input formControlName="nombre" type="text" class="form-control" />
            </div>

            <div class="col-12">
              <label class="form-label">Razón Social</label>
              <input formControlName="razon_social" type="text" class="form-control" />
            </div>

            <div class="col-12">
              <label class="form-label">RTN (Registro Tributario Nacional)</label>
              <input formControlName="rtn" type="text" class="form-control" />
            </div>

            <div class="col-12">
              <label class="form-label">Dirección</label>
              <textarea formControlName="direccion" class="form-control" rows="3"></textarea>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Teléfono</label>
              <input formControlName="telefono" type="text" class="form-control" />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Email</label>
              <input formControlName="correo" type="email" class="form-control" />
            </div>

            <div class="col-12">
              <label class="form-label">Sitio Web</label>
              <input formControlName="sitio_web" type="text" class="form-control" />
            </div>
          </div>
        </div>

        <div class="col-12 d-flex justify-content-end">
          <button type="submit" class="btn btn-dark px-4">
            Guardar Cambios
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div
    class="toast align-items-center text-white border-0"
    role="alert"
    [class.show]="toastVisible"
    [ngClass]="toastColor">
    <div class="d-flex">
      <div class="toast-body">
        {{ toastMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastVisible=false"></button>
    </div>
  </div>
</div>
